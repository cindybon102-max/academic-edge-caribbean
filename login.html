<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your Academic Edge Caribbean account">
  <title>Login — Academic Edge Caribbean</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">
      <img src="logo.png" class="logo-img" alt="Academic Edge Caribbean">
    </div>
  </header>

  <main>
    <section class="auth-section">
      <h2>Welcome back</h2>
      <p class="auth-sub">Log in to continue learning</p>

      <form class="auth-form" id="loginForm" novalidate>

        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          >
        </div>

        <button type="submit" class="primary">Login</button>

      </form>

      <p class="auth-link">Don't have an account? <a href="register.html">Sign up</a></p>

    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
